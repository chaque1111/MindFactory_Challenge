services:

  db:
    image: postgres:15
    container_name: mindfactory-db
    environment:
      POSTGRES_DB: mindFactory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./back
    container_name: mindfactory-backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      POSTGRES_DB: mindFactory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      POSTGRES_HOST: db

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: http://localhost:3000
    container_name: mindfactory-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend


volumes:
  postgres_data:
